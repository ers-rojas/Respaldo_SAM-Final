<!-- 🔷 Contenido principal -->
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary">📋 Plantillas Promocionales</h2>
    <a routerLink="crear" class="btn btn-primary d-flex align-items-center">
      <i class="fas fa-plus me-2"></i> Crear Plantilla
    </a>
  </div>

  <!-- Tabla -->
  <div class="card border-0 shadow-lg">
    <div class="card-body p-4">
      <table class="table table-hover align-middle">
        <thead class="table-light text-center">
          <tr>
            <th>#</th>
            <th>Título</th>
            <th>Fecha de creación</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let plantilla of plantillas; let i = index">
            <td class="text-center">{{ i + 1 }}</td>
            <td>{{ plantilla.title }}</td>
            <td>{{ plantilla.created_at | date: 'dd/MM/yyyy' }}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-info me-2" (click)="verPlantilla(plantilla)">
                <i class="fas fa-eye me-1"></i> Ver
              </button>
              <button class="btn btn-sm btn-outline-warning me-2" (click)="editarPlantilla(plantilla)">
                <i class="fas fa-edit me-1"></i> Editar
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="eliminarPlantilla(plantilla)">
                <i class="fas fa-trash-alt me-1"></i> Eliminar
              </button>
            </td>
          </tr>
          <tr *ngIf="plantillas.length === 0">
            <td colspan="4" class="text-center text-muted">No hay plantillas disponibles.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ✅ Botón continuar -->
  <div class="text-end mt-4">
    <button class="btn btn-success" (click)="continuar()">
      <i class="fas fa-arrow-right me-1"></i> Continuar
    </button>
  </div>

  <!-- Rutas hijas -->
  <router-outlet></router-outlet>
</div>
