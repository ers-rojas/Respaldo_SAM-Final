<!-- Formulario de Envío de Correos -->
<div class="container mt-5">
  <div class="card mx-auto" style="max-width: 5000px;">
    <div class="card-header text-center">
      <h2>Gestión de Correos</h2>
    </div>
    <div class="card-body">
  <form [formGroup]="formCorreo" (ngSubmit)="enviarCorreo()">
        <!-- Plantilla -->
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-layer-group"></i></span>
            <select class="form-select" id="plantilla" formControlName="plantilla_id">
              <option value="" disabled selected>Plantilla</option>
              <option *ngFor="let plantilla of plantillas" [value]="plantilla.id">{{ plantilla.title }}</option>
      </select>
          </div>
        </div>

        <!-- Nombre remitente -->
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="nombre_remitente" formControlName="nombre_remitente" placeholder="Nombre remitente">
          </div>
    </div>

        <!-- Asunto -->
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-tag"></i></span>
            <input type="text" class="form-control" id="asunto" formControlName="asunto" placeholder="Asunto del correo">
          </div>
    </div>

        <!-- Botón -->
        <div class="text-center">
          <button type="submit" class="btn btn-primary px-5">Enviar Correos</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Vista previa de la plantilla -->
<div *ngIf="contenidoPlantilla" class="vista-previa-plantilla container mt-5">
  <div class="card mx-auto" style="max-width: 5000px;">
    <div class="card-header text-center">
      <h3>Vista previa de la plantilla</h3>
    </div>
    <div class="card-body">
  <div class="contenido" [innerHTML]="contenidoPlantilla"></div>
    </div>
  </div>
</div>
